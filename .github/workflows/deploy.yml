name: CI/CD Pipeline for Java WAR Deployment

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: "Select Environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - test
          - pre-prod
          - prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Maven Validate
        run: mvn validate

      - name: Maven Compile
        run: mvn compile

      - name: Maven Test
        run: mvn test

      - name: Maven Package
        run: mvn clean package

      - name: Verify WAR File
        run: |
          echo "Contents of target directory:"
          ls -lh target
          echo
          echo "WAR File:"
          find target -name "*.war"

      ####################################################################
      # Deploy to DEV
      ####################################################################
      - name: Deploy to DEV
        if: github.event_name == 'push' || github.event.inputs.environment == 'dev'
        run: |
          curl --fail -v \
            -u "${{ secrets.DEV_USER }}:${{ secrets.DEV_PASSWORD }}" \
            -T target/TrainBook-1.0.0-SNAPSHOT.war \
            "http://${{ secrets.DEV_HOST }}:8080/manager/text/deploy?path=/TrainBook&update=true"

      - name: Verify DEV Deployment
        if: github.event_name == 'push' || github.event.inputs.environment == 'dev'
        run: |
          curl -u "${{ secrets.DEV_USER }}:${{ secrets.DEV_PASSWORD }}" \
          "http://${{ secrets.DEV_HOST }}:8080/manager/text/list"

      ####################################################################
      # Deploy to TEST
      ####################################################################
      - name: Deploy to TEST
        if: github.event.inputs.environment == 'test'
        run: |
          curl --fail -v \
            -u "${{ secrets.TEST_USER }}:${{ secrets.TEST_PASSWORD }}" \
            -T target/TrainBook-1.0.0-SNAPSHOT.war \
            "http://${{ secrets.TEST_HOST }}:8080/manager/text/deploy?path=/TrainBook&update=true"

      - name: Verify TEST Deployment
        if: github.event.inputs.environment == 'test'
        run: |
          curl -u "${{ secrets.TEST_USER }}:${{ secrets.TEST_PASSWORD }}" \
          "http://${{ secrets.TEST_HOST }}:8080/manager/text/list"

      ####################################################################
      # Deploy to PRE-PROD
      ####################################################################
      - name: Deploy to PRE-PROD
        if: github.event.inputs.environment == 'pre-prod'
        run: |
          curl --fail -v \
            -u "${{ secrets.PREPROD_USER }}:${{ secrets.PREPROD_PASSWORD }}" \
            -T target/TrainBook-1.0.0-SNAPSHOT.war \
            "http://${{ secrets.PREPROD_HOST }}:8080/manager/text/deploy?path=/TrainBook&update=true"

      - name: Verify PRE-PROD Deployment
        if: github.event.inputs.environment == 'pre-prod'
        run: |
          curl -u "${{ secrets.PREPROD_USER }}:${{ secrets.PREPROD_PASSWORD }}" \
          "http://${{ secrets.PREPROD_HOST }}:8080/manager/text/list"

      ####################################################################
      # Deploy to PROD
      ####################################################################
      - name: Deploy to PROD
        if: github.event.inputs.environment == 'prod'
        run: |
          curl --fail -v \
            -u "${{ secrets.PROD_USER }}:${{ secrets.PROD_PASSWORD }}" \
            -T target/TrainBook-1.0.0-SNAPSHOT.war \
            "http://${{ secrets.PROD_HOST }}:8080/manager/text/deploy?path=/TrainBook&update=true"

      - name: Verify PROD Deployment
        if: github.event.inputs.environment == 'prod'
        run: |
          curl -u "${{ secrets.PROD_USER }}:${{ secrets.PROD_PASSWORD }}" \
          "http://${{ secrets.PROD_HOST }}:8080/manager/text/list"
