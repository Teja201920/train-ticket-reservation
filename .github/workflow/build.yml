name: CI/CD Pipeline for Train Ticket Reservation

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: "Select Deployment Environment"
        required: true
        type: choice
        options:
          - dev
          - test
          - pre-prod
          - prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Validate Project
        run: mvn validate

      - name: Compile Source Code
        run: mvn compile

      - name: Run Unit Tests
        run: mvn test

      - name: Package Application
        run: mvn clean package

      - name: Verify Generated WAR File
        run: |
          echo "Listing target directory..."
          ls -lh target/
          echo "WAR File:"
          find target -name "*.war"

      # ---------------- DEV ----------------
      - name: Deploy to DEV Tomcat
        if: github.event.inputs.environment == 'dev'
        run: |
          curl --fail -v \
          -u "${{ secrets.DEV_USER }}:${{ secrets.DEV_PASSWORD }}" \
          -T target/TrainBook-1.0.0-SNAPSHOT.war \
          "http://${{ secrets.DEV_HOST }}:8080/manager/text/deploy?path=/TrainBook&update=true"

      # ---------------- TEST ----------------
      - name: Deploy to TEST Tomcat
        if: github.event.inputs.environment == 'test'
        run: |
          curl --fail -v \
          -u "${{ secrets.TEST_USER }}:${{ secrets.TEST_PASSWORD }}" \
          -T target/TrainBook-1.0.0-SNAPSHOT.war \
          "http://${{ secrets.TEST_HOST }}:8080/manager/text/deploy?path=/TrainBook&update=true"

      # ---------------- PRE-PROD ----------------
      - name: Deploy to PRE-PROD Tomcat
        if: github.event.inputs.environment == 'pre-prod'
        run: |
          curl --fail -v \
          -u "${{ secrets.PREPROD_USER }}:${{ secrets.PREPROD_PASSWORD }}" \
          -T target/TrainBook-1.0.0-SNAPSHOT.war \
          "http://${{ secrets.PREPROD_HOST }}:8080/manager/text/deploy?path=/TrainBook&update=true"

      # ---------------- PROD ----------------
      - name: Deploy to PROD Tomcat
        if: github.event.inputs.environment == 'prod'
        run: |
          curl --fail -v \
          -u "${{ secrets.PROD_USER }}:${{ secrets.PROD_PASSWORD }}" \
          -T target/TrainBook-1.0.0-SNAPSHOT.war \
          "http://${{ secrets.PROD_HOST }}:8080/manager/text/deploy?path=/TrainBook&update=true"
